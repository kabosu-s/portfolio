language: 'ja'
reviews:
  profile: 'chill'
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true                                                         
    base_branches:       
      - "main"
  path_filters:
    - '!**/*.lock'
    - '!**/package-lock.json'
    - '!**/pnpm-lock.yaml'
    - '!**/bun.lockb'
    - '!**/node_modules/**'
  path_instructions:
    - path: '**/*.{ts,tsx}'
      instructions: |
        Next.js 15 (App Router) & Tailwind CSS 4のプロジェクトです。以下の観点でレビューしてください：
        - Accessibility (a11y) First: セマンティックHTMLの使用、適切なaria-label、フォーカス管理が行われているか。
        - Neobrutalism Design: デザインSkillに沿った実装か（太いボーダー、ハードシャドウ、セマンティックな色の使用）。
        - TypeScript: anyの使用・不要な型キャストがないか（Warning）。
        - コンポーネント定義: `export const ComponentName = ({ props }: Props) => { ... }` 形式か。`interface`定義が同ファイルにあるか。
        - Client Components: ブラウザAPIやStateが必要な場合のみ `"use client";` が付与されているか。
        - Tailwind CSS 4: `@theme inline` 変数を使用しているか。長いクラス文字列には読みやすさのための改行があるか。
    - path: 'src/app/**/*.{ts,tsx}'
      instructions: |
        app/配下はルーティングとページ定義を担います。
        - params・searchParamsは Promise として扱い、必ず `await` して使用しているか（Next.js 15の破壊的変更）。
        - Server Components を優先し、副作用のないデータ取得が行われているか。
    - path: 'src/components/ui/**/*.{ts,tsx}'
      instructions: |
        汎用的なUIコンポーネントです。
        - Neobrutalism スタイルの整合性（border-2〜4, shadow-large〜[4px_4px_0px_0px_...] 等）を確認してください。
        - 再利用性が高く、特定のドメイン知識が混入していないか。
chat:
  auto_reply: true
